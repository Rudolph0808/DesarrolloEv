name: CI Compilador Semantico

# Se ejecutará cada vez que alguien haga push a la rama main o un Pull Request
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar el código
      uses: actions/checkout@v3

    - name: Configurar Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Instalar dependencias (PLY)
      run: |
        python -m pip install --upgrade pip
        pip install ply

    - name: Correr Pruebas Semánticas
      run: python test_runner.py